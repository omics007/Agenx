<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Agent Skills 聚合平台 - 发现、探索、使用前沿AI Agent技能">
    <title>Agent Skills | 探索前沿Agent技能市场</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="#/" class="nav-logo">
                <svg class="logo-icon" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="20" cy="20" r="18" stroke="url(#logoGradient)" stroke-width="2"/>
                    <path d="M14 20L18 24L26 16" stroke="url(#logoGradient)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <defs>
                        <linearGradient id="logoGradient" x1="0" y1="0" x2="40" y2="40">
                            <stop offset="0%" stop-color="#e31937"/>
                            <stop offset="100%" stop-color="#0057d9"/>
                        </linearGradient>
                    </defs>
                </svg>
                <span class="logo-text">Agent<span class="logo-accent">Skills</span></span>
            </a>
            
            <div class="nav-links" id="navLinks">
                <a href="#/" class="nav-link active" data-page="home">首页</a>
                <a href="#/skills" class="nav-link" data-page="skills">Skills市场</a>
                <a href="#/news" class="nav-link" data-page="news">资讯中心</a>
                <a href="#/tutorials" class="nav-link" data-page="tutorials">教程中心</a>
            </div>
            
            <button class="nav-search" id="navSearchBtn" aria-label="搜索">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"/>
                    <path d="m21 21-4.35-4.35"/>
                </svg>
            </button>
            
            <button class="nav-menu-btn" id="navMenuBtn" aria-label="菜单">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </nav>
    
    <!-- Mobile Menu -->
    <div class="mobile-menu" id="mobileMenu">
        <div class="mobile-menu-content">
            <a href="#/" class="mobile-link active" data-page="home">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
                首页
            </a>
            <a href="#/skills" class="mobile-link" data-page="skills">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
                Skills市场
            </a>
            <a href="#/news" class="mobile-link" data-page="news">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-2 2Zm0 0a2 2 0 0 1-2-2v-9c0-1.1.9-2 2-2h2"/><path d="M18 14h-8"/><path d="M15 18h-5"/><path d="M10 6h8v4h-8V6Z"/></svg>
                资讯中心
            </a>
            <a href="#/tutorials" class="mobile-link" data-page="tutorials">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
                教程中心
            </a>
        </div>
    </div>
    
    <!-- Search Overlay -->
    <div class="search-overlay" id="searchOverlay">
        <div class="search-container">
            <div class="search-input-wrapper">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"/>
                    <path d="m21 21-4.35-4.35"/>
                </svg>
                <input type="text" class="search-input" id="searchInput" placeholder="搜索 Skills、资讯、教程..." autocomplete="off">
                <button class="search-close" id="searchClose">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                </button>
            </div>
            <div class="search-results" id="searchResults"></div>
        </div>
    </div>
    
    <!-- Main Content -->
    <main class="main-content" id="mainContent">
        <!-- Content will be dynamically rendered here -->
    </main>
    
    <!-- Footer -->
    <footer class="footer">
        <div class="footer-container">
            <div class="footer-divider"></div>
            <div class="footer-content">
                <p class="footer-copyright">© 2024 AgentSkills. 探索AI的无限可能.</p>
                <div class="footer-links">
                    <a href="#">关于</a>
                    <a href="#">隐私</a>
                    <a href="#">联系</a>
                </div>
            </div>
        </div>
    </footer>
    
    <!-- Scripts -->
    <script src="scripts/app.js"></script>
</body>
</html>
